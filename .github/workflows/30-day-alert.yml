name: 30-Day Overdue Alert

on:
  schedule:
    - cron: '0 13 * * 1'  # 8AM CST every Monday
  workflow_dispatch:

jobs:
  run-30-day-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 30-day overdue alert on the Worker
        run: |
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            if curl --fail-with-body -sS -X POST \
                -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
                "${{ vars.WORKER_URL }}/api/cron/30-day-alert"; then
              echo "✓ 30-day alert triggered successfully"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "✗ Request failed, waiting 15 seconds before retry..."
              sleep 15
            fi
          done
          echo "✗ Failed after 3 attempts"
          exit 1
