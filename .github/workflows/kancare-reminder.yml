name: KanCare Billing Reminder

on:
  schedule:
    - cron: '0 13 25 * *'  # 8AM CST on the 25th
  workflow_dispatch:

jobs:
  run-kancare-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KanCare reminder on the Worker
        run: |
          curl --fail-with-body -sS -X POST \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ vars.WORKER_URL }}/api/cron/kancare-reminder"
