name: Monthly Invoice Notice

on:
  schedule:
    - cron: '0 13 20 * *'  # 8AM CST on the 20th
  workflow_dispatch:

jobs:
  run-monthly-invoices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly invoice notice on the Worker
        run: |
          curl --fail-with-body -sS -X POST \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "${{ vars.WORKER_URL }}/api/cron/monthly-invoices"
