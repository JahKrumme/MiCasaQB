name: Monthly Invoice Notice

on:
  schedule:
    - cron: '0 13 20 * *'  # 8AM CST on the 20th
  workflow_dispatch:

jobs:
  run-monthly-invoices:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render and send monthly invoice notice
        run: |
          sleep 90
          curl --fail-with-body https://micasaqb.onrender.com/run-monthly-invoices
