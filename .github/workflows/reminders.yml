name: Billing Reminders

on:
  schedule:
    - cron: '0 13 * * *'    # Daily 8AM CST — overdue check
    - cron: '0 13 20 * *'   # 20th 8AM CST — monthly invoice notice
    - cron: '0 13 25 * *'   # 25th 8AM CST — KanCare reminder
  workflow_dispatch:

jobs:
  daily-check:
    if: github.event.schedule == '0 13 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render and run overdue check
        run: |
          sleep 60
          curl -f https://micasaqb.onrender.com/run-check

  monthly-invoices:
    if: github.event.schedule == '0 13 20 * *'
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render and send monthly invoice notice
        run: |
          sleep 60
          curl -f https://micasaqb.onrender.com/run-monthly-invoices

  kancare-reminder:
    if: github.event.schedule == '0 13 25 * *'
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render and send KanCare reminder
        run: |
          sleep 60
          curl -f https://micasaqb.onrender.com/run-kancare-reminder
