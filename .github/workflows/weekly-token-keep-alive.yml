name: Weekly QB Token Keep-Alive

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh QB token
        run: |
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            if curl --fail-with-body -v https://micasaqb.onrender.com/keep-alive; then
              echo "✓ QB token refreshed successfully"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "✗ Request failed, waiting 30 seconds before retry..."
              sleep 30
            fi
          done
          echo "✗ Failed after 3 attempts"
          exit 1
